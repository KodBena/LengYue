[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show full diffs on assertion failures
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Pure Python tests, no DB, no I/O
    integration: Requires an in-memory SQLite session
    defect: Documents a known confirmed defect (xfail)

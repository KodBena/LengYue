# .github/workflows/work-status-ci.yml
#
# Work-status SSOT gate (umbrella-level). docs/work-status.json is the single
# source of truth for work-actionable item status; docs/work-status.schema.json
# is its fixed schema. This workflow runs tools/work-status/check.mjs, which:
#   - lints the schema itself (enum disjointness — facets must not share a
#     value, the nominal-type check JSON Schema's string-enums erase; and that
#     the if/then conditionals only reference real fields/values);
#   - validates the data against the schema (a zero-dep validator that
#     INTERPRETS the schema, so the schema stays the sole source of constraints);
#   - checks the cross-record invariants JSON Schema cannot express (id
#     uniqueness, referential integrity, depends_on/parent acyclicity).
# It exits non-zero on any hard error; advisory warnings (e.g. a doc/source
# ref path that no longer resolves) are printed but do not fail the gate,
# mirroring the doc-graph broken-reference report's posture.
#
# It also runs the checker's and the query tool's --selftest so the gate
# itself, and the SQL tool's JSON→SQLite loader (the trust anchor for queries),
# are verified on every change — not just the data.
#
# Rationale: single-maintainer project (no second reviewer); the gate is the
# mechanical substitute that catches a malformed SSOT — or a schema that lets a
# value leak onto the wrong facet — before it lands. Mirrors doc-graph-ci.yml.
#
# Zero external dependencies: check.mjs is pure Node; sql.mjs uses the built-in
# node:sqlite (Node 22.5+). No Graphviz, no node_modules.
#
# License: Public Domain (The Unlicense)
name: work-status-ci

on:
  pull_request:
    paths:
      - 'docs/work-status.json'
      - 'docs/work-status.schema.json'
      - 'tools/work-status/**'
      - '.github/workflows/work-status-ci.yml'
  push:
    branches: [main]
    paths:
      - 'docs/work-status.json'
      - 'docs/work-status.schema.json'
      - 'tools/work-status/**'
      - '.github/workflows/work-status-ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate the work-status SSOT against its schema (the gate)
        run: node tools/work-status/check.mjs
      - name: Self-test the checker (does it catch each violation class?)
        run: node tools/work-status/check.mjs --selftest
      - name: Self-test the SQL query tool's JSON→SQLite loader
        run: node tools/work-status/sql.mjs --selftest

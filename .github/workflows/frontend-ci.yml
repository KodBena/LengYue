# .github/workflows/frontend-ci.yml
#
# Frontend CI gate. The SPA's safety nets — the strict typecheck
# (`vue-tsc -b`), the ESLint import-boundary + type-checked rules, and the
# Vitest suite (incl. the ADR-0010 render-count regression guards) — run
# only locally until now; this makes them load-bearing on every PR.
# Rationale: single-maintainer project (no second reviewer), so an
# automated gate is the substitute that catches a boundary violation,
# render-coupling regression, or type error before it lands.
#
# Scope: frontend/ only. The proxy/ submodule has its own workflows
# (proxy/.github/workflows/); the backend is independent. The env-gated
# e2e suites (tests/e2e/*, describe.skipIf on proxy-URL env vars) skip
# automatically here — no live backend/proxy in CI.
#
# The band-conformance job (below) is wired into THIS workflow rather than
# doc-graph-ci because its two inputs are both under frontend/: the import
# graph of frontend/src AND the band tags in frontend/FILES.md. doc-graph-ci
# triggers on FILES.md but NOT frontend/src/**, so a band leak introduced by a
# new import would not retrigger it — this workflow's `frontend/**` filter
# covers both. The band-ordering finding DETAIL is advisory (printed, per
# ADR-0011 Rule 5: judgment-shaped output gets an advisory surface, not a
# per-finding tollgate), but the finding COUNT is RATCHETED: `--check` FAILS if
# the count exceeds NO_NEW_FINDINGS_RATCHET (a new band leak) — the ADR-0011
# Rule-3 graduation that prevents NEW leaks without gating on the existing
# baseline (modelled on the doc-graph NO_NEW_DANGLERS_RATCHET, but wired to
# gate). It ALSO FAILS on crisp structural drift (a FILES.md row resolving to
# no file, a src file with no FILES.md row, a broken import) — the ADR-0002
# fail-loud class, gated on a zero baseline. See tools/band-conformance/check.mjs.
#
# License: Public Domain (The Unlicense)
name: frontend-ci

on:
  pull_request:
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

# Least privilege: build/lint/test + band-conformance only — both jobs are
# read-only (no push, comment, or GitHub API writes).
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck + build (vue-tsc -b && vite build)
        run: npm run build
      - name: Lint (import boundaries + type-checked rules)
        run: npx eslint .
      - name: Test (unit + integration + render-count guards)
        run: npm run test:run

  # ── Band-conformance: ADR-0003 band-ordering audit (drift gate + ratchet) ──
  # Runs the umbrella-level checker (tools/band-conformance/check.mjs, zero-deps
  # Node, no npm install) over frontend/src + frontend/FILES.md. `--check` gates
  # on (1) structural drift (ghost rows / missing rows / broken imports — the
  # crisp ADR-0002 class, zero baseline) AND (2) the no-new-findings ratchet:
  # the advisory band-ordering COUNT exceeding NO_NEW_FINDINGS_RATCHET (a new
  # band leak) fails the build, while the finding DETAIL stays advisory/printed
  # (ADR-0011 Rule 5). The job also runs the self-test fixtures, which prove the
  # loud-failure path fires (the jquery-bridge ghost-row shape). No
  # `working-directory` override: the tool reads from the repo root.
  band-conformance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Band-conformance self-test (loud-failure fixtures)
        run: node tools/band-conformance/check.mjs --self-test
      - name: Band-conformance check (structural-drift gate + no-new-findings ratchet)
        run: node tools/band-conformance/check.mjs --check

  # ── Cycle-check: import-cycle ratchet (no new circular dependencies) ──
  # Runs the umbrella-level checker (tools/cycle-check/check.mjs, zero-deps Node,
  # sharing tools/import-graph.mjs with band-conformance — the extracted walker)
  # over frontend/src's runtime VALUE-edge graph. `--check` gates on the
  # NO-NEW-CYCLES ratchet: the cyclic-cluster count or the file-in-cycle count
  # EXCEEDING the measured baseline (a new import cycle, or an existing tangle
  # growing) fails the build; the baseline itself does not gate. A runtime import
  # cycle is the structural precondition of the vite-8.0.12 vitest-teardown
  # deadlock (PR #444). The self-test proves SCC detection fires on a cycle and
  # stays clean on a DAG. No `working-directory` override: reads from repo root.
  cycle-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cycle-check self-test (SCC detection proofs)
        run: node tools/cycle-check/check.mjs --self-test
      - name: Cycle-check (no-new-cycles ratchet)
        run: node tools/cycle-check/check.mjs --check
